server:
  port: 8080
  host: localhost
  read_timeout: 15s
  write_timeout: 15s
  idle_timeout: 60s

services:
  - name: "user-service"
    path_prefix: "/api/v1/users"
    load_balancer: "round_robin"
    target:
      - "http://localhost:8081"
      - "http://localhost:8082"
    middlewares:
      - type: rate_limit
        rate: 10
        burst: 20
